<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>影像旅誌 — Photo Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafa;
      --bg-card: #ffffff;
      --bg-elevated: #f5f5f0;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-dim: #a0a0a0;
      --accent: #3a3a3a;
      --accent-soft: rgba(58,58,58,0.06);
      --border: rgba(0,0,0,0.08);
      --border-accent: rgba(0,0,0,0.15);
    }

    body {
      font-family: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    .serif { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-weight: 400; }

    /* Header */
    .header {
      padding: 4rem 2rem 3rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.02) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.35em;
      color: var(--accent); margin-bottom: 1rem; font-weight: 500;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
      font-size: 3.2rem; font-weight: 300; letter-spacing: 0.15em; color: var(--text);
    }
    .header-sub {
      font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
      font-size: 1.1rem; font-weight: 300; font-style: italic;
      color: var(--text-muted); margin-top: 0.6rem; letter-spacing: 0.04em;
    }
    .header-line { width: 40px; height: 1px; background: var(--accent); margin: 1.5rem auto 0; }

    /* Back button */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      position: absolute; top: 2rem; left: 2rem;
      font-size: 0.72rem; letter-spacing: 0.15em; color: var(--text-muted);
      text-decoration: none; cursor: pointer; background: none; border: none;
      font-family: inherit; padding: 0.5rem 0.8rem; transition: color 0.2s;
      z-index: 10;
    }
    .back-link:hover { color: var(--text); }

    /* Trip list */
    .trip-grid {
      max-width: 980px; margin: 3rem auto; padding: 0 2rem;
      display: grid; gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .trip-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 2px; overflow: hidden; cursor: pointer;
      transition: all 0.3s; text-decoration: none; color: inherit; display: block;
    }
    .trip-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }
    .trip-cover { width: 100%; aspect-ratio: 16/10; overflow: hidden; background: var(--bg-elevated); }
    .trip-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .trip-card:hover .trip-cover img { transform: scale(1.04); }
    .trip-info { padding: 1.5rem 1.6rem 1.8rem; }
    .trip-date {
      font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dim);
      margin-bottom: 0.6rem;
    }
    .trip-title {
      font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
      font-size: 1.7rem; font-weight: 400; color: var(--text);
      letter-spacing: 0.04em; line-height: 1.3;
    }
    .trip-subtitle {
      font-size: 0.82rem; color: var(--text-muted); margin-top: 0.4rem;
      font-weight: 300;
    }
    .trip-meta {
      display: flex; gap: 1rem; margin-top: 1rem;
      font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em;
    }
    .trip-meta span::before { content: '· '; margin-right: 0.25rem; }
    .trip-meta span:first-child::before { content: ''; margin: 0; }

    /* Empty state */
    .empty-state { max-width: 600px; margin: 4rem auto; padding: 0 2rem; text-align: center; }
    .empty-state-box { border: 1px solid var(--border); padding: 4rem 2rem; background: var(--bg-card); border-radius: 2px; }
    .empty-state h3 { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 1.6rem; font-weight: 400; color: var(--text); margin-bottom: 0.8rem; }
    .empty-state p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.8; }
    .empty-state code { background: var(--bg-elevated); padding: 0.15rem 0.5rem; border-radius: 2px; font-size: 0.78rem; font-family: 'SF Mono', monospace; color: var(--text); }

    /* Stats */
    .stats-bar {
      max-width: 780px; margin: 2.5rem auto; padding: 0 2rem;
      display: flex; gap: 1px; background: rgba(0,0,0,0.06);
    }
    .stat { flex: 1; background: var(--bg-card); padding: 1.5rem 1rem; text-align: center; }
    .stat-num {
      font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
      font-size: 2rem; font-weight: 300; color: var(--text); line-height: 1;
    }
    .stat-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-dim); margin-top: 0.5rem; }

    /* Map */
    .map-section { max-width: 980px; margin: 3rem auto; padding: 0 2rem; }
    .section-label { font-size: 0.6rem; letter-spacing: 0.3em; color: var(--text-dim); margin-bottom: 1.2rem; }
    .map-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
    .leaflet-map { width: 100%; height: 380px; background: #e8e6e0; }
    .map-info { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
    .map-info-text { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.04em; }

    /* Custom leaflet styles */
    .leaflet-popup-content-wrapper {
      background: var(--bg-card); color: var(--text);
      border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
    }
    .leaflet-popup-content { margin: 0.8rem 1rem; font-size: 0.82rem; font-family: inherit; }
    .leaflet-popup-content b {
      font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
      font-weight: 400; font-size: 1.05rem;
    }
    .leaflet-popup-tip { background: var(--bg-card); border: 1px solid var(--border); }
    .custom-pin {
      width: 14px; height: 14px; background: var(--accent); border: 2px solid white;
      border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    /* Timeline */
    .timeline-section { max-width: 780px; margin: 3rem auto; padding: 0 2rem; }
    .timeline { position: relative; padding-left: 3rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 1px; background: linear-gradient(180deg, var(--accent), var(--border), transparent);
    }
    .date-group { margin-bottom: 3rem; }
    .date-label {
      position: relative; font-size: 0.62rem; font-weight: 500;
      letter-spacing: 0.2em; color: var(--accent);
      padding: 0.3rem 0; margin-bottom: 1.5rem;
    }
    .date-label::before {
      content: ''; position: absolute; left: -3.18rem; top: 50%;
      transform: translateY(-50%); width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 8px rgba(58,58,58,0.15);
    }

    /* Photo Card */
    .photo-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 2px; overflow: hidden; margin-bottom: 1.5rem;
      position: relative; transition: border-color 0.3s;
    }
    .photo-card:hover { border-color: var(--border-accent); }
    .photo-card::before {
      content: ''; position: absolute; left: -3.28rem; top: 2.5rem;
      width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim);
    }
    .photo-wrapper { position: relative; width: 100%; aspect-ratio: 2.2/1; overflow: hidden; background: var(--bg-elevated); }

    .gallery { position: relative; width: 100%; height: 100%; }
    .gallery-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1); pointer-events: none; }
    .gallery-slide.active { opacity: 1; pointer-events: auto; }
    .gallery-slide img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
    .gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.9); border: 1px solid var(--border);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--text);
      backdrop-filter: blur(10px); transition: all 0.2s; z-index: 2;
      font-family: 'Inter', sans-serif;
    }
    .gallery-nav:hover { background: white; transform: translateY(-50%) scale(1.05); }
    .gallery-nav.prev { left: 1rem; }
    .gallery-nav.next { right: 1rem; }
    .gallery-dots {
      position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem; z-index: 2;
      background: rgba(255,255,255,0.85); padding: 0.4rem 0.7rem;
      border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid var(--border);
    }
    .gallery-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.2s; border: none; padding: 0; }
    .gallery-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }
    .gallery-counter {
      position: absolute; top: 1rem; left: 1rem;
      background: rgba(255,255,255,0.9); color: var(--text);
      padding: 0.35rem 0.8rem; border-radius: 2px;
      font-size: 0.68rem; letter-spacing: 0.08em;
      backdrop-filter: blur(10px); border: 1px solid var(--border);
      font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; z-index: 2;
    }
    .photo-time-badge {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.9); color: var(--text);
      padding: 0.35rem 0.8rem; border-radius: 2px;
      font-size: 0.68rem; letter-spacing: 0.08em;
      backdrop-filter: blur(10px); border: 1px solid var(--border); z-index: 2;
    }

    .photo-info { padding: 1.5rem 1.8rem 1.8rem; }
    .location-row { display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
    .location-pin { color: var(--accent); font-size: 0.55rem; letter-spacing: 0.15em; font-weight: 500; flex-shrink: 0; }
    .location-name { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-weight: 400; font-size: 1.4rem; color: var(--text); letter-spacing: 0.02em; }
    .gps-coords { font-size: 0.62rem; color: var(--text-dim); margin-left: auto; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.04em; flex-shrink: 0; }
    .description { font-size: 0.85rem; color: var(--text-muted); line-height: 1.9; margin-top: 0.8rem; font-weight: 300; }
    .description.pending { color: var(--text-dim); font-style: italic; }
    .meta-row { display: flex; gap: 1rem; margin-top: 0.8rem; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.04em; flex-wrap: wrap; }
    .meta-row span::before { content: '· '; margin-right: 0.3rem; }
    .meta-row span:first-child::before { content: ''; margin: 0; }
    .pending-note { display: inline-block; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--text-dim); margin-top: 0.8rem; padding: 0.3rem 0.6rem; border: 1px dashed var(--border-accent); border-radius: 2px; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .tag { font-size: 0.65rem; padding: 0.25rem 0.7rem; border-radius: 2px; background: transparent; border: 1px solid var(--border); color: var(--text-dim); letter-spacing: 0.04em; transition: all 0.3s; }
    .tag:hover { border-color: var(--text-muted); color: var(--text-muted); }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(10,10,10,0.94); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); animation: lbFade 0.25s ease; }
    .lightbox.open { display: flex; }
    @keyframes lbFade { from { opacity: 0; } to { opacity: 1; } }
    .lightbox-img { max-width: 92vw; max-height: 88vh; object-fit: contain; cursor: zoom-out; box-shadow: 0 20px 80px rgba(0,0,0,0.5); animation: lbZoom 0.3s cubic-bezier(0.2,0.8,0.2,1); }
    @keyframes lbZoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .lightbox-close, .lightbox-nav {
      position: absolute; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: #fff;
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; backdrop-filter: blur(10px); transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .lightbox-close:hover, .lightbox-nav:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }
    .lightbox-close { top: 1.5rem; right: 1.5rem; }
    .lightbox-nav.prev { left: 1.5rem; top: 50%; transform: translateY(-50%); }
    .lightbox-nav.next { right: 1.5rem; top: 50%; transform: translateY(-50%); }
    .lightbox-nav.prev:hover { transform: translateY(-50%) scale(1.05); }
    .lightbox-nav.next:hover { transform: translateY(-50%) scale(1.05); }
    .lightbox-counter { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 0.85rem; letter-spacing: 0.1em; padding: 0.4rem 1rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; backdrop-filter: blur(10px); }
    .lightbox-caption { position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.85); font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 0.95rem; font-style: italic; letter-spacing: 0.06em; padding: 0.4rem 1.2rem; max-width: 70vw; text-align: center; }

    /* Footer */
    .footer { text-align: center; padding: 4rem 2rem; border-top: 1px solid var(--border); }
    .footer p { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 1rem; font-style: italic; color: var(--text-dim); font-weight: 300; }
    .footer .footer-sub { font-family: 'Inter', 'Noto Sans TC', sans-serif; font-style: normal; font-size: 0.68rem; letter-spacing: 0.12em; margin-top: 0.8rem; }

    @media (min-width: 768px) {
      .header h1 { font-size: 4rem; }
      .header { padding: 5rem 2rem 4rem; }
    }
    @media (max-width: 600px) {
      .location-name { font-size: 1.15rem; }
      .gps-coords { display: none; }
      .stats-bar { flex-wrap: wrap; }
      .stat { flex-basis: calc(50% - 1px); }
      .back-link { top: 1rem; left: 1rem; }
      .header { padding-top: 4.5rem; }
      .lightbox-nav.prev { left: 0.6rem; }
      .lightbox-nav.next { right: 0.6rem; }
      .lightbox-close { top: 0.8rem; right: 0.8rem; }
      .lightbox-caption { font-size: 0.8rem; top: 0.8rem; }
      .leaflet-map { height: 280px; }
    }
  </style>
</head>
<body>

  <header class="header" id="site-header">
    <button class="back-link" id="back-btn" style="display:none;">← 所有旅程</button>
    <div class="header-eyebrow" id="header-eyebrow">旅行筆記</div>
    <h1 class="serif" id="header-title">影像旅誌</h1>
    <p class="header-sub" id="header-sub">將照片交織成一段旅程</p>
    <div class="header-line"></div>
  </header>

  <main id="app">
    <div class="empty-state">
      <div class="empty-state-box">
        <h3>正在載入⋯</h3>
      </div>
    </div>
  </main>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="照片放大檢視">
    <button class="lightbox-close" aria-label="關閉">✕</button>
    <button class="lightbox-nav prev" aria-label="上一張">&larr;</button>
    <button class="lightbox-nav next" aria-label="下一張">&rarr;</button>
    <div class="lightbox-caption" id="lb-caption"></div>
    <img class="lightbox-img" id="lb-img" alt="">
    <div class="lightbox-counter" id="lb-counter"></div>
  </div>

  <div class="footer" style="padding-bottom: 4rem;">
    <p>讓你的照片，說出旅程的故事</p>
    <p class="footer-sub">繼續上傳，延續這段旅誌</p>
  </div>

  <script>
    const fmtDate = (d) => {
      const dt = new Date(d + 'T00:00:00');
      const w = ['日','一','二','三','四','五','六'][dt.getDay()];
      return `${dt.getFullYear()} 年 ${dt.getMonth()+1} 月 ${dt.getDate()} 日 · 星期${w}`;
    };
    const fmtDateShort = (d) => {
      const dt = new Date(d + 'T00:00:00');
      return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
    };
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let allTrips = [];
    let currentTripId = null;
    const entryCache = new Map();
    let activeMap = null;

    // ---------- Renderers ----------

    function renderEmpty() {
      return `
        <div class="empty-state">
          <div class="empty-state-box">
            <h3>尚無照片</h3>
            <p>將照片放入 <code>photos/</code> 資料夾<br>然後執行 <code>npm run process</code></p>
          </div>
        </div>`;
    }

    function findPhotoById(trip, id) {
      for (const e of trip.entries) for (const p of e.photos) if (p.id === id) return p;
      return trip.entries[0]?.photos[0];
    }

    function renderTripList(trips) {
      const cards = trips.map(trip => {
        const cover = findPhotoById(trip, trip.cover_photo_id);
        const range = trip.date_start === trip.date_end
          ? fmtDateShort(trip.date_start)
          : `${fmtDateShort(trip.date_start)} — ${fmtDateShort(trip.date_end)}`;
        return `
          <a class="trip-card" href="#/trip/${esc(trip.id)}">
            <div class="trip-cover">${cover?.thumb ? `<img src="${esc(cover.thumb)}" alt="${esc(trip.title)}" loading="lazy">` : ''}</div>
            <div class="trip-info">
              <div class="trip-date">${esc(range)}</div>
              <div class="trip-title serif">${esc(trip.title)}</div>
              ${trip.subtitle ? `<div class="trip-subtitle">${esc(trip.subtitle)}</div>` : ''}
              <div class="trip-meta">
                <span>${trip.stats.photos} 張照片</span>
                <span>${trip.stats.entries} 篇</span>
                <span>${trip.stats.days} 天</span>
                ${trip.stats.km > 0 ? `<span>${trip.stats.km} km</span>` : ''}
              </div>
            </div>
          </a>`;
      }).join('');
      return `<div class="trip-grid">${cards}</div>`;
    }

    function renderStats(stats) {
      return `
        <div class="stats-bar">
          <div class="stat"><div class="stat-num serif">${stats.photos}</div><div class="stat-label">張照片</div></div>
          <div class="stat"><div class="stat-num serif">${stats.locations}</div><div class="stat-label">個地點</div></div>
          <div class="stat"><div class="stat-num serif">${stats.days}</div><div class="stat-label">天旅程</div></div>
          <div class="stat"><div class="stat-num serif">${stats.km}</div><div class="stat-label">公里</div></div>
        </div>`;
    }

    function renderMapSection(entries) {
      const geoEntries = entries.filter(e => e.location);
      if (!geoEntries.length) return '';
      return `
        <div class="map-section">
          <div class="section-label">路線地圖</div>
          <div class="map-box">
            <div id="leaflet-map" class="leaflet-map"></div>
            <div class="map-info">
              <span class="map-info-text">${geoEntries.length} 個地點</span>
              <span class="map-info-text">© OpenStreetMap</span>
            </div>
          </div>
        </div>`;
    }

    function mountLeafletMap(entries) {
      const geoEntries = entries
        .filter(e => e.location)
        .sort((a, b) => new Date(a.photos[0].taken_at) - new Date(b.photos[0].taken_at));
      if (!geoEntries.length) return;
      if (activeMap) { activeMap.remove(); activeMap = null; }

      const coords = geoEntries.map(e => [e.location.lat, e.location.lon]);
      const map = L.map('leaflet-map', { scrollWheelZoom: false, zoomControl: true });
      activeMap = map;
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors', maxZoom: 19,
      }).addTo(map);

      // Polyline (route)
      if (coords.length > 1) {
        L.polyline(coords, { color: '#3a3a3a', weight: 2, opacity: 0.6, dashArray: '6,6' }).addTo(map);
      }

      // Markers
      geoEntries.forEach((e, i) => {
        const icon = L.divIcon({
          className: '', html: '<div class="custom-pin"></div>',
          iconSize: [18, 18], iconAnchor: [9, 9],
        });
        L.marker([e.location.lat, e.location.lon], { icon })
          .addTo(map)
          .bindPopup(`<b>${esc(e.location.place_name)}</b><br>${esc(fmtDateShort(e.date))} · ${esc(e.time)}`);
      });

      // Fit bounds
      const bounds = L.latLngBounds(coords);
      map.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 });
    }

    function renderGallery(entry) {
      const n = entry.photos.length;
      const slides = entry.photos.map((p, i) => `
        <div class="gallery-slide ${i === 0 ? 'active' : ''}" data-index="${i}">
          ${p.thumb ? `<img src="${esc(p.thumb)}" alt="${esc(p.filename)}" loading="lazy">` : ''}
        </div>`).join('');
      if (n === 1) {
        return `<div class="gallery">${slides}<div class="photo-time-badge">${esc(entry.photos[0].time)}</div></div>`;
      }
      const dots = entry.photos.map((_, i) =>
        `<button class="gallery-dot ${i === 0 ? 'active' : ''}" data-index="${i}" aria-label="第 ${i+1} 張"></button>`
      ).join('');
      return `
        <div class="gallery" data-entry="${entry.id}" data-count="${n}">
          ${slides}
          <button class="gallery-nav prev" data-dir="-1" aria-label="上一張">&larr;</button>
          <button class="gallery-nav next" data-dir="1" aria-label="下一張">&rarr;</button>
          <div class="gallery-counter" data-counter><span class="serif">1</span> / ${n}</div>
          <div class="gallery-dots">${dots}</div>
        </div>`;
    }

    function renderEntry(entry) {
      const gps = entry.location
        ? `<span class="gps-coords">${entry.location.lat.toFixed(4)}, ${entry.location.lon.toFixed(4)}</span>`
        : '';
      const cam = entry.photos.find(p => p.camera)?.camera;
      const s = entry.photos.find(p => p.settings)?.settings;
      const meta = cam || s ? `
        <div class="meta-row">
          ${cam ? `<span>${esc(cam)}</span>` : ''}
          ${s?.focal ? `<span>${esc(s.focal)}</span>` : ''}
          ${s?.f ? `<span>${esc(s.f)}</span>` : ''}
          ${s?.iso ? `<span>ISO ${esc(s.iso)}</span>` : ''}
          ${entry.photos.length > 1 ? `<span>${entry.photos.length} 張照片</span>` : ''}
        </div>` : (entry.photos.length > 1 ? `<div class="meta-row"><span>${entry.photos.length} 張照片</span></div>` : '');
      const hasDesc = entry.ai_description && entry.ai_description.trim();
      const desc = hasDesc
        ? `<div class="description">${esc(entry.ai_description)}</div>`
        : `<div class="description pending">（景點介紹待撰寫⋯）</div><div class="pending-note">待生成</div>`;
      const tags = entry.tags?.length
        ? `<div class="tags">${entry.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`
        : '';

      entryCache.set(entry.id, { photos: entry.photos, caption: entry.location?.place_name || '' });

      return `
        <div class="photo-card" data-entry="${esc(entry.id)}">
          <div class="photo-wrapper">${renderGallery(entry)}</div>
          <div class="photo-info">
            <div class="location-row">
              <span class="location-pin">地點</span>
              <span class="location-name serif">${esc(entry.location?.place_name || '未知地點')}</span>
              ${gps}
            </div>
            ${desc}
            ${meta}
            ${tags}
          </div>
        </div>`;
    }

    function renderTimeline(entries) {
      const groups = {};
      for (const e of entries) (groups[e.date] ||= []).push(e);
      const dates = Object.keys(groups).sort();
      const dayIdx = d => dates.indexOf(d) + 1;
      const groupHtml = dates.map(date => `
        <div class="date-group">
          <div class="date-label">${esc(fmtDate(date))} · 第 ${dayIdx(date)} 天</div>
          ${groups[date].map(renderEntry).join('')}
        </div>`).join('');
      return `
        <div class="timeline-section">
          <div class="section-label">旅行紀事</div>
          <div class="timeline">${groupHtml}</div>
        </div>`;
    }

    function renderTripDetail(trip) {
      return renderStats(trip.stats) + renderMapSection(trip.entries) + renderTimeline(trip.entries);
    }

    // ---------- Gallery & Lightbox interactions ----------

    function attachGalleryHandlers(root) {
      root.querySelectorAll('.gallery[data-count]').forEach(gallery => {
        const count = Number(gallery.dataset.count);
        const slides = gallery.querySelectorAll('.gallery-slide');
        const dots = gallery.querySelectorAll('.gallery-dot');
        const counter = gallery.querySelector('[data-counter] .serif');
        const prevBtn = gallery.querySelector('.gallery-nav.prev');
        const nextBtn = gallery.querySelector('.gallery-nav.next');
        let current = 0;
        const go = (idx) => {
          current = ((idx % count) + count) % count;
          slides.forEach((s, i) => s.classList.toggle('active', i === current));
          dots.forEach((d, i) => d.classList.toggle('active', i === current));
          if (counter) counter.textContent = current + 1;
        };
        prevBtn?.addEventListener('click', () => go(current - 1));
        nextBtn?.addEventListener('click', () => go(current + 1));
        dots.forEach((dot, i) => dot.addEventListener('click', () => go(i)));
        let startX = 0;
        gallery.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
        gallery.addEventListener('touchend', e => {
          const dx = e.changedTouches[0].clientX - startX;
          if (Math.abs(dx) > 50) go(current + (dx < 0 ? 1 : -1));
        });
        gallery.tabIndex = 0;
        gallery.addEventListener('keydown', e => {
          if (e.key === 'ArrowLeft') { go(current - 1); e.preventDefault(); }
          if (e.key === 'ArrowRight') { go(current + 1); e.preventDefault(); }
        });
      });
    }

    const lightbox = {
      el: null, img: null, caption: null, counter: null,
      photos: [], idx: 0, captionText: '',
      init() {
        this.el = document.getElementById('lightbox');
        this.img = document.getElementById('lb-img');
        this.caption = document.getElementById('lb-caption');
        this.counter = document.getElementById('lb-counter');
        this.el.querySelector('.lightbox-close').addEventListener('click', () => this.close());
        this.el.querySelector('.lightbox-nav.prev').addEventListener('click', e => { e.stopPropagation(); this.go(-1); });
        this.el.querySelector('.lightbox-nav.next').addEventListener('click', e => { e.stopPropagation(); this.go(1); });
        this.img.addEventListener('click', () => this.close());
        this.el.addEventListener('click', e => { if (e.target === this.el) this.close(); });
        document.addEventListener('keydown', e => {
          if (!this.el.classList.contains('open')) return;
          if (e.key === 'Escape') this.close();
          if (e.key === 'ArrowLeft') this.go(-1);
          if (e.key === 'ArrowRight') this.go(1);
        });
      },
      open(photos, idx, captionText) {
        this.photos = photos; this.idx = idx; this.captionText = captionText || '';
        this.render();
        this.el.classList.add('open');
        document.body.style.overflow = 'hidden';
      },
      close() { this.el.classList.remove('open'); document.body.style.overflow = ''; },
      go(delta) {
        const n = this.photos.length;
        this.idx = ((this.idx + delta) % n + n) % n;
        this.render();
      },
      render() {
        const p = this.photos[this.idx];
        this.img.src = p.thumb; this.img.alt = p.filename || '';
        const n = this.photos.length;
        this.counter.textContent = n > 1 ? `${this.idx + 1} / ${n}` : '';
        this.counter.style.display = n > 1 ? 'block' : 'none';
        this.el.querySelectorAll('.lightbox-nav').forEach(b => b.style.display = n > 1 ? 'flex' : 'none');
        this.caption.textContent = this.captionText;
        this.caption.style.display = this.captionText ? 'block' : 'none';
      }
    };

    function attachLightboxHandlers(root) {
      root.querySelectorAll('.gallery-slide img').forEach(img => {
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          const slide = img.closest('.gallery-slide');
          const idx = Number(slide?.dataset.index || 0);
          const card = img.closest('.photo-card');
          const cardId = card?.dataset.entry;
          const data = entryCache.get(cardId);
          if (data) lightbox.open(data.photos, idx, data.caption);
        });
      });
    }

    // ---------- Router ----------

    function updateHeader(view, trip) {
      const backBtn = document.getElementById('back-btn');
      const eyebrow = document.getElementById('header-eyebrow');
      const title = document.getElementById('header-title');
      const sub = document.getElementById('header-sub');
      if (view === 'trip' && trip) {
        backBtn.style.display = 'inline-flex';
        eyebrow.textContent = `${fmtDateShort(trip.date_start)}${trip.date_start !== trip.date_end ? ' — ' + fmtDateShort(trip.date_end) : ''}`;
        title.textContent = trip.title;
        sub.textContent = trip.subtitle || `${trip.stats.photos} 張照片 · ${trip.stats.entries} 篇記事`;
      } else {
        backBtn.style.display = 'none';
        eyebrow.textContent = '旅行筆記';
        title.textContent = '影像旅誌';
        sub.textContent = '將照片交織成一段旅程';
      }
    }

    function route() {
      const app = document.getElementById('app');
      if (activeMap) { activeMap.remove(); activeMap = null; }
      entryCache.clear();

      const hash = location.hash || '';
      const tripMatch = hash.match(/^#\/trip\/(.+)$/);

      if (tripMatch) {
        const trip = allTrips.find(t => t.id === tripMatch[1]);
        if (trip) {
          currentTripId = trip.id;
          updateHeader('trip', trip);
          app.innerHTML = renderTripDetail(trip);
          attachGalleryHandlers(app);
          attachLightboxHandlers(app);
          mountLeafletMap(trip.entries);
          window.scrollTo(0, 0);
          return;
        }
      }

      // Default: trip list
      currentTripId = null;
      updateHeader('list');
      if (!allTrips.length) { app.innerHTML = renderEmpty(); return; }
      if (allTrips.length === 1) {
        // Single trip: jump straight to detail
        location.hash = `#/trip/${allTrips[0].id}`;
        return;
      }
      app.innerHTML = renderTripList(allTrips);
      window.scrollTo(0, 0);
    }

    async function load() {
      const app = document.getElementById('app');
      try {
        const res = await fetch('data/posts.json?t=' + Date.now());
        if (!res.ok) throw new Error('no data');
        const data = await res.json();
        allTrips = data.trips || [];
        route();
      } catch (err) {
        console.error(err);
        app.innerHTML = renderEmpty();
      }
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      location.hash = '';
    });
    window.addEventListener('hashchange', route);

    lightbox.init();
    load();
  </script>

</body>
</html>
